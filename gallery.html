    <!-- JAVASCRIPT (inline di body, bukan di head) -->
    <script>
        // ── Slideshow state ──
        var ss = {
            hs: { cur: 0, total: 4, timer: null },
            bn: { cur: 0, total: 4, timer: null },
            pp: { cur: 0, total: 4, timer: null }
        };

        function goSlide(key, idx) {
            var s = ss[key];
            // Hide old
            var oldSlide = document.getElementById('slide-' + key + '-' + s.cur);
            var oldDot   = document.getElementById('dot-'   + key + '-' + s.cur);
            if (oldSlide) { oldSlide.style.opacity = '0'; var i = oldSlide.querySelector('img'); if(i){i.style.transform='scale(1)'; i.style.filter='brightness(0.85) saturate(0.9)';} }
            if (oldDot)   { oldDot.style.background = 'rgba(255,229,229,0.3)'; oldDot.style.transform = 'scale(1)'; }
            s.cur = idx;
            // Show new
            var newSlide = document.getElementById('slide-' + key + '-' + s.cur);
            var newDot   = document.getElementById('dot-'   + key + '-' + s.cur);
            if (newSlide) { newSlide.style.opacity = '1'; var j = newSlide.querySelector('img'); if(j){j.style.transform='scale(1.04)'; j.style.filter='brightness(0.95) saturate(1)';} }
            if (newDot)   { newDot.style.background = '#E83A3A'; newDot.style.transform = 'scale(1.3)'; }
        }

        function startSS(key) {
            var s = ss[key];
            if (s.timer) clearInterval(s.timer);
            s.timer = setInterval(function(){ goSlide(key, (ss[key].cur + 1) % ss[key].total); }, 3200);
        }

        function stopSS(key) {
            if (ss[key].timer) { clearInterval(ss[key].timer); ss[key].timer = null; }
        }

        function openModal(key) {
            stopSS(key);
            var m = document.getElementById('modal-' + key);
            if (m) { m.style.display = 'flex'; }
        }

        function closeModal(key) {
            var m = document.getElementById('modal-' + key);
            if (m) { m.style.display = 'none'; }
            startSS(key);
        }

        // ESC to close
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                ['hs','bn','pp'].forEach(function(k) {
                    var m = document.getElementById('modal-' + k);
                    if (m && m.style.display === 'flex') closeModal(k);
                });
            }
        });

        // Start all slideshows
        window.onload = function() {
            startSS('hs');
            startSS('bn');
            startSS('pp');
        };
    </script>
