<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJWEB - Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="fullheight-body">

    <div class="bg-gradient"></div>

    <div class="fullheight-wrapper">

        <header>
            <h1 class="logo"><span class="logo-accent">AJ</span>WEB</h1>
            <nav>
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="gallery.html">Gallery</a>
                <a href="blog.html">Blog</a>
                <a href="contact.html">Contact</a>
            </nav>
            <div class="header-spacer"></div>
        </header>

        <main class="fullheight-main">

            <h1 class="page-title">Lifetime Gallery</h1>
            <p class="page-subtitle">Memories &middot; Moments &middot; Milestones</p>

            <div class="cards-grid">

                <!-- HIGH SCHOOL CARD -->
                <div class="card" id="card-hs" onclick="openModal('hs')">
                    <div class="card-glow"></div>
                    <div class="card-header">
                        <div class="card-header-left">
                            <span class="card-icon">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
                            </span>
                            <span class="card-title">High School</span>
                        </div>
                        <span class="card-arrow" id="arrow-hs">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                        </span>
                    </div>
                    <div id="ss-hs" class="slideshow-container"></div>
                </div>

                <!-- BINCE CARD -->
                <div class="card" id="card-bn" onclick="openModal('bn')">
                    <div class="card-glow"></div>
                    <div class="card-header">
                        <div class="card-header-left">
                            <span class="card-icon">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                            </span>
                            <span class="card-title">Bince</span>
                        </div>
                        <span class="card-arrow" id="arrow-bn">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                        </span>
                    </div>
                    <div id="ss-bn" class="slideshow-container"></div>
                </div>

                <!-- PUTRA PUTRI CARD -->
                <div class="card" id="card-pp" onclick="openModal('pp')">
                    <div class="card-glow"></div>
                    <div class="card-header">
                        <div class="card-header-left">
                            <span class="card-icon">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                            </span>
                            <span class="card-title card-title-sm">Putra Putri Fak. Teknik</span>
                        </div>
                        <span class="card-arrow" id="arrow-pp">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                        </span>
                    </div>
                    <div id="ss-pp" class="slideshow-container"></div>
                </div>

            </div>
        </main>
    </div>

    <!-- MODAL: HIGH SCHOOL -->
    <div id="modal-hs" class="modal" onclick="if(event.target===this) closeModal('hs')">
        <div class="modal-inner">
            <div class="modal-header">
                <div class="modal-header-left">
                    <span class="card-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg></span>
                    <span class="modal-title">High School</span>
                </div>
                <button class="modal-close" onclick="closeModal('hs')">&#10005;</button>
            </div>
            <div class="modal-body">
                <div class="photo-grid">
                    <div class="photo-item" onclick="openLightbox('hs', 0)"><img src="highschool-photo/hs-1.jpg" alt="High School 1"></div>
                    <div class="photo-item" onclick="openLightbox('hs', 1)"><img src="highschool-photo/hs-2.jpg" alt="High School 2"></div>
                    <div class="photo-item" onclick="openLightbox('hs', 2)"><img src="highschool-photo/hs-3.jpg" alt="High School 3"></div>
                    <div class="photo-item" onclick="openLightbox('hs', 3)"><img src="highschool-photo/hs-4.jpg" alt="High School 4"></div>
                    <div class="photo-item" onclick="openLightbox('hs', 4)"><img src="highschool-photo/hs-5.jpg" alt="High School 5"></div>
                    <div class="photo-item" onclick="openLightbox('hs', 5)"><img src="highschool-photo/hs-6.jpg" alt="High School 6"></div>
                    <div class="video-item" onclick="openVideoPlayer('highschool-photo/hs-video-1.mp4', 'High School Video 1')">
                        <div class="video-thumb">
                            <svg class="video-play-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/></svg>
                            <span class="video-label">Video 1</span>
                        </div>
                    </div>
                    <div class="video-item" onclick="openVideoPlayer('highschool-photo/hs-video-2.mp4', 'High School Video 2')">
                        <div class="video-thumb">
                            <svg class="video-play-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/></svg>
                            <span class="video-label">Video 2</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL: BINCE -->
    <div id="modal-bn" class="modal" onclick="if(event.target===this) closeModal('bn')">
        <div class="modal-inner">
            <div class="modal-header">
                <div class="modal-header-left">
                    <span class="card-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
                    <span class="modal-title">Bince</span>
                </div>
                <button class="modal-close" onclick="closeModal('bn')">&#10005;</button>
            </div>
            <div class="modal-body">
                <div class="photo-grid">
                    <div class="photo-item" onclick="openLightbox('bn', 0)"><img src="bince-photo/bince-1.jpeg" alt="Bince 1"></div>
                    <div class="photo-item" onclick="openLightbox('bn', 1)"><img src="bince-photo/bince-2.jpeg" alt="Bince 2"></div>
                    <div class="photo-item" onclick="openLightbox('bn', 2)"><img src="bince-photo/bince-3.jpeg" alt="Bince 3"></div>
                    <div class="photo-item" onclick="openLightbox('bn', 3)"><img src="bince-photo/bince-4.jpeg" alt="Bince 4"></div>
                    <div class="photo-item" onclick="openLightbox('bn', 4)"><img src="bince-photo/bince-5.jpeg" alt="Bince 5"></div>
                    <div class="photo-item" onclick="openLightbox('bn', 5)"><img src="bince-photo/bince-6.jpeg" alt="Bince 6"></div>
                    <div class="video-item" onclick="openVideoPlayer('bince-photo/bn-video-1.mp4', 'Bince Video 1')">
                        <div class="video-thumb">
                            <svg class="video-play-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/></svg>
                            <span class="video-label">Video 1</span>
                        </div>
                    </div>
                    <div class="video-item" onclick="openVideoPlayer('bince-photo/bn-video-2.mp4', 'Bince Video 2')">
                        <div class="video-thumb">
                            <svg class="video-play-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/></svg>
                            <span class="video-label">Video 2</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL: PUTRA PUTRI -->
    <div id="modal-pp" class="modal" onclick="if(event.target===this) closeModal('pp')">
        <div class="modal-inner">
            <div class="modal-header">
                <div class="modal-header-left">
                    <span class="card-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span>
                    <span class="modal-title">Putra Putri Fakultas Teknik</span>
                </div>
                <button class="modal-close" onclick="closeModal('pp')">&#10005;</button>
            </div>
            <div class="modal-body">
                <div class="photo-grid">
                    <div class="photo-item" onclick="openLightbox('pp', 0)"><img src="ppft-photo/ppft-1.jpg" alt="Putra Putri 1"></div>
                    <div class="photo-item" onclick="openLightbox('pp', 1)"><img src="ppft-photo/ppft-2.jpg" alt="Putra Putri 2"></div>
                    <div class="photo-item" onclick="openLightbox('pp', 2)"><img src="ppft-photo/ppft-3.jpg" alt="Putra Putri 3"></div>
                    <div class="photo-item" onclick="openLightbox('pp', 3)"><img src="ppft-photo/ppft-4.jpg" alt="Putra Putri 4"></div>
                    <div class="photo-item" onclick="openLightbox('pp', 4)"><img src="ppft-photo/ppft-5.jpg" alt="Putra Putri 5"></div>
                    <div class="photo-item" onclick="openLightbox('pp', 5)"><img src="ppft-photo/ppft-6.jpg" alt="Putra Putri 6"></div>
                    <div class="video-item" onclick="openVideoPlayer('ppft-photo/pp-video-1.mp4', 'Putra Putri Video 1')">
                        <div class="video-thumb">
                            <svg class="video-play-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/></svg>
                            <span class="video-label">Video 1</span>
                        </div>
                    </div>
                    <div class="video-item" onclick="openVideoPlayer('ppft-photo/pp-video-2.mp4', 'Putra Putri Video 2')">
                        <div class="video-thumb">
                            <svg class="video-play-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/></svg>
                            <span class="video-label">Video 2</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- LIGHTBOX -->
    <div id="lightbox" class="lightbox">
        <div id="lb-counter" class="lightbox-counter"></div>
        <button class="lightbox-close" onclick="closeLightboxFull()">&#10005;</button>
        <button class="lightbox-nav lightbox-prev" id="lb-prev" onclick="shiftLightbox(-1)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <img id="lb-img" src="" alt="" class="lightbox-img">
        <button class="lightbox-nav lightbox-next" id="lb-next" onclick="shiftLightbox(1)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
    </div>

    <!-- VIDEO PLAYER MODAL -->
    <div id="video-modal" class="modal" onclick="if(event.target===this) closeVideoPlayer()">
        <div class="modal-inner video-modal-inner">
            <div class="modal-header">
                <div class="modal-header-left">
                    <span class="card-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/></svg>
                    </span>
                    <span class="modal-title" id="video-modal-title">Video</span>
                </div>
                <button class="modal-close" onclick="closeVideoPlayer()">&#10005;</button>
            </div>
            <div class="video-player-wrap">
                <video id="video-player" controls playsinline>
                    Your browser does not support the video tag.
                </video>
            </div>
        </div>
    </div>

    <script src="nav.js"></script>
    <script src="gallery.js"></script>
</body>
</html>
